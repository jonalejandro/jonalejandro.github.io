<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/theme.css' | relative_url }}">
</head>
<body>
  <header class="site-nav">
    <a class="nav-logo" href="{{ '/' | relative_url }}">Jon Alejandro</a>
    <nav>
      <ul class="nav-links">
        <li><a href="{{ '/notes/' | relative_url }}" class="{% if page.url == '/notes/' %}is-active{% endif %}">Writing</a></li>
        <li><a href="{{ '/about/' | relative_url }}" class="{% if page.url == '/about/' %}is-active{% endif %}">About</a></li>
        <li><a href="https://www.linkedin.com/in/jonalejandro" target="_blank" rel="noopener">LinkedIn ↗</a></li>
      </ul>
    </nav>
  </header>

  <main class="page">
    {% if page.eyebrow %}<div class="eyebrow">{{ page.eyebrow }}</div>{% endif %}
    {% if page.title %}<h1 class="page-title">{{ page.title }}</h1>{% endif %}
    {% if page.subtitle %}<p class="subtitle">{{ page.subtitle }}</p>{% endif %}
    {{ content }}
  </main>

  <footer class="footer">
    <span>© {{ site.time | date: '%Y' }} Jon Alejandro</span>
    <span><a href="{{ '/about/' | relative_url }}">About</a> · <a href="{{ '/feed.xml' | relative_url }}">RSS</a></span>
  </footer>
</body>
</html>
